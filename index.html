<!DOCTYPE html>
<html>
<head>
    <title>Docker Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f4f8;
            text-align: center;
        }
        h1 {
            color: #0366d6;
        }
        .badge {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            margin: 20px 0;
        }
        .container-info {
            background: #e6e6e6;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Hello from Docker!</h1>
    <div class="badge">Container is Running</div>
    <div class="container-info">
        <p>This web page is served from a Docker container.</p>
        <p><small>Web server: nginx (alpine)</small></p>
    </div>
    <p>Built with Docker Desktop!</p>
</body>
</html>
